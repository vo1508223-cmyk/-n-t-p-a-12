        { id: 9, q: "Nhà máy nhiệt điện nào sau đây ở nước ta hiện nay chạy bằng khí?", opts: {A: "Phú Mỹ", B: "Quảng Ninh.", C: "Vũng Áng.", D: "Phả Lại"}, ans: "A" },
        { id: 10, q: "Phát biểu nào sau đây đúng với ngành bưu chính?", opts: {A: "Doanh thu còn thấp nhưng có tốc độ tăng trưởng nhanh.", B: "Đẩy mạnh phát triển các loại hình dịch vụ truyền thống.", C: "Mạng lưới phân bố rộng khắp, phát triển mạnh ở đồi núi.", D: "Dịch vụ bưu chính còn đơn giản, hiệu quả kinh tế thấp."}, ans: "A" },

        { id: 13, q: "Nhận xét nào sau đây đúng với biểu đồ Diện tích và sản lượng hồ tiêu của nước ta (2017 - 2022)?", opts: {A: "Diện tích hồ tiêu tăng liên tục, sản lượng hồ tiêu giảm liên tục.", B: "Sản lượng hồ tiêu tăng liên tục, diện tích hồ tiêu giảm liên tục.", C: "Diện tích hồ tiêu giảm liên tục, sản lượng hồ tiêu tăng không liên tục.", D: "Sản lượng hồ tiêu giảm không liên tục, diện tích hồ tiêu giảm liên tục."}, ans: "C" },
        { id: 14, q: "Phát biểu nào sau đây không đúng về công nghiệp khai thác dầu thô ở nước ta", opts: {A: "Liên doanh, hợp tác với nước ngoài trong thăm dò, khai thác.", B: "Bắt đầu khai thác từ thế kỉ XX tại Bạch Hổ, sau dần mở rộng.", C: "Sản lượng liên tục tăng qua các năm và hiện nay tăng nhanh.", D: "Sản phẩm đã cung cấp cho các nhà máy lọc dầu và xuất khẩu"}, ans: "C" },

        { id: 17, q: "Sản phẩm nào sau đây thuộc công nghiệp chế biến sản phẩm chăn nuôi ở nước ta?", opts: {A: "Thịt, sữa.", B: "Tôm, cá.", C: "Nước mắm.", D: "Hồ tiêu."}, ans: "A" },

        { id: 20, q: "Công nghiệp nước ta hiện nay chuyển dịch theo hướng", opts: {A: "Tăng tỉ trọng sản phẩm có giá trị cao.", B: "Phân bố đồng đều tại khắp các vùng.", C: "Giảm tối đa sở hữu ngoài nhà nước.", D: "Tập trung nhiều cho việc khai khoáng."}, ans: "A" },
        { id: 21, q: "Những nơi có nguồn nước khoáng, nước nóng thuận lợi cho phát triển loại hình du lịch nào sau đây?", opts: {A: "Du lịch cộng đồng.", B: "Du lịch mua sắm.", C: "Du lịch chăm sóc sức khỏe.", D: "Du lịch sinh thái."}, ans: "C" },
        { id: 22, q: "Những địa phương có lịch sử văn hoá lâu đời với các bản sắc văn hoá đặc sắc, đa dạng thuận lợi cho phát triển loại hình du lịch nào sau đây?", opts: {A: "Du lịch mạo hiểm.", B: "Du lịch mua sắm.", C: "Du lịch văn hoá.", D: "Du lịch nghỉ dưỡng"}, ans: "C" },
        { id: 23, q: "Ngành kinh tế nào sau đây không thuộc nhóm ngành dịch vụ?", opts: {A: "Bưu chính viễn thông.", B: "Du lịch.", C: "Tài chính ngân hàng.", D: "Nuôi trồng thủy hải sản."}, ans: "D" },
        { id: 24, q: "Phát biểu nào sau đây không đúng với đường thuỷ nội địa ở nước ta?", opts: {A: "Mạng lưới rộng khắp cả nước.", B: "Chủ yếu vận chuyển hàng hoá.", C: "Kết nối với đường bộ hạn chế.", D: "Chịu tác động lớn của tự nhiên."}, ans: "C" },
        { id: 25, q: "Giao thông vận tải đường biển nước ta", opts: {A: "có hệ thống cảng biển gắn với các trung tâm kinh tế lớn.", B: "có khối lượng hàng hoá vận chuyển và luân chuyển giảm.", C: "đứng đầu các ngành giao thông về vận chuyển hành khách.", D: "có các tuyến đường đi đến tất cả các quốc gia trên thế giới."}, ans: "A" },
        { id: 26, q: "Điều kiện thuận lợi để phát triển giao thông biển ở nước ta là", opts: {A: "vùng biển rộng và nhiều vịnh sâu.", B: "vận chuyển được nhiều hàng hoá.", C: "có các tuyến đường biển quốc tế.", D: "phát triển và nâng cấp nhiều cảng."}, ans: "A" },
        { id: 27, q: "Phát biểu nào sau đây không đúng với viễn thông nước ta hiện nay?", opts: {A: "Mạng lưới có sự phát triển nhanh, đa dạng.", B: "Phát triển theo hướng hiện đại và rộng khắp.", C: "Điện thoại cố định được dùng phổ biến nhất.", D: "Mạng lưới kết nối đồng bộ, dung lượng lớn."}, ans: "C" },
        { id: 28, q: "Mạng viễn thông truyền dẫn ở nước ta hội nhập với quốc tế qua", opts: {A: "hệ thống vệ tinh và cáp quang.", B: "cáp quang và đài truyền hình.", C: "ra-đi-ô và điện thoại cố định.", D: "telegram và thư tín, máy fax."}, ans: "A" },
        { id: 29, q: "Trong cơ cấu ngành công nghiệp nước ta hiện nay giảm tỉ trọng nhóm ngành khai khoáng, tăng nhóm ngành chế biến, chế tạo nhằm mục đích chủ yếu", opts: {A: "tạo sản phẩm chủ lực, góp phần giải quyết việc làm.", B: "bảo vệ nguồn tài nguyên, công nghệ phát triển.", C: "đáp ứng nhu cầu thị trường, thu hút vốn đầu tư.", D: "trình độ lao động cao, nhu cầu thị trường lớn."}, ans: "B" },

        { id: 32, q: "Ở nước ta, những năm gần đây tỉ trọng công nghiệp chế biến trong giá trị sản xuất công nghiệp tăng lên do nguyên nhân chủ yếu nào sau đây?", opts: {A: "Thị trường tiêu thụ mở rộng, hiệu quả kinh tế cao, đa dạng ngành nghề.", B: "Thu hút lao động chuyên môn cao, nguyên liệu phong phú, tạo việc làm.", C: "Mang lại hiệu quả cao về kinh tế, thu hút đầu tư lớn, chính sách ưu tiên.", D: "Mở rộng hội nhập quốc tế, đầu tư cơ sở chế biến, nguồn lao động đông."}, ans: "A" },

                    p1Score++;

                    document.getElementById(`lbl-p1-${q.id}-${selected.value}`).classList.add('wrong-answer');

                }
            } else {
                document.getElementById(`lbl-p1-${q.id}-${q.ans}`).classList.add('correct-answer');
